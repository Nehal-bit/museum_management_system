# ── Database ─────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/museum_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Nehal123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA ──────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── Server ───────────────────────────────────────────────────────────────
server.port=8080

# ── Serialization: ignore lazy-load failures gracefully ──────────────────
spring.jackson.serialization.fail-on-empty-beans=false

# ── Logging ──────────────────────────────────────────────────────────────
logging.level.com.museum=INFO
